name: Mirror upstream tags

on:
  schedule:
    # Daily at 06:37 UTC, after upstream-sync runs
    - cron: "37 6 * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "If 'true', mirror upstream's latest tag even if we have no local tags yet."
        required: false
        default: "false"

permissions:
  contents: write

env:
  UPSTREAM_REPO: yandex-cloud/k8s-csi-s3

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror new upstream v* tags onto current HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP: ${{ github.event.inputs.bootstrap }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || true
          git fetch upstream --no-tags 'refs/tags/v*:refs/upstream-tags/*'

          # Only consider well-formed semver-ish v* tags.
          upstream_tags=$(git for-each-ref --format='%(refname:strip=2)' refs/upstream-tags \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          local_tags=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)

          if [ -z "$upstream_tags" ]; then
            echo "No semver-shaped upstream tags found."
            exit 0
          fi

          # Determine cutoff: our newest local tag, or upstream's latest if bootstrapping.
          if [ -n "$local_tags" ]; then
            newest_local=$(printf '%s\n' "$local_tags" | sort -V | tail -1)
            echo "Newest local tag: $newest_local"
          elif [ "$BOOTSTRAP" = "true" ]; then
            # Bootstrap: only mirror upstream's single latest tag, nothing else.
            newest_upstream=$(printf '%s\n' "$upstream_tags" | sort -V | tail -1)
            echo "Bootstrapping with upstream latest only: $newest_upstream"
            git tag -a "$newest_upstream" -m "Mirrored from ${UPSTREAM_REPO}@${newest_upstream}"
            git push origin "refs/tags/${newest_upstream}"
            exit 0
          else
            echo "No local tags and bootstrap=false. Refusing to mirror 47-ish historical tags." >&2
            echo "Re-run with bootstrap=true to seed with upstream's latest." >&2
            exit 0
          fi

          # Mirror only upstream tags strictly greater than our newest.
          to_create=$(printf '%s\n' "$upstream_tags" | sort -V \
            | awk -v cutoff="$newest_local" '
                function vercmp(a, b,   ap, bp, i, n) {
                  n = split(a, ap, /[v.]/); split(b, bp, /[v.]/);
                  for (i=2; i<=n; i++) {
                    if ((ap[i]+0) > (bp[i]+0)) return  1;
                    if ((ap[i]+0) < (bp[i]+0)) return -1;
                  }
                  return 0;
                }
                { if (vercmp($0, cutoff) > 0) print }
              ')

          if [ -z "$to_create" ]; then
            echo "No upstream tags newer than $newest_local. Nothing to mirror."
            exit 0
          fi

          echo "Will mirror tags onto current HEAD ($(git rev-parse --short HEAD)):"
          printf '  %s\n' $to_create

          for tag in $to_create; do
            git tag -a "$tag" -m "Mirrored from ${UPSTREAM_REPO}@${tag}"
            git push origin "refs/tags/${tag}"
          done
